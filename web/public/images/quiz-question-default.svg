<svg xmlns="http://www.w3.org/2000/svg" width="480" height="320" viewBox="0 0 480 320" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="film" x1="0" y1="0" x2="480" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1a2332"/>
      <stop offset="0.45" stop-color="#243447"/>
      <stop offset="1" stop-color="#0f1419"/>
    </linearGradient>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#3d4f63" stroke-opacity="0.35" stroke-width="0.5"/>
    </pattern>
    <linearGradient id="bone" x1="200" y1="60" x2="280" y2="260" gradientUnits="userSpaceOnUse">
      <stop stop-color="#e2e8f0" stop-opacity="0.22"/>
      <stop offset="0.5" stop-color="#cbd5e1" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#94a3b8" stop-opacity="0.2"/>
    </linearGradient>
  </defs>
  <rect width="480" height="320" fill="url(#film)"/>
  <rect width="480" height="320" fill="url(#grid)"/>
  <!-- Stylized long bone / film silhouette -->
  <ellipse cx="240" cy="165" rx="42" ry="118" fill="url(#bone)"/>
  <ellipse cx="240" cy="72" rx="28" ry="36" fill="url(#bone)"/>
  <ellipse cx="240" cy="258" rx="32" ry="40" fill="url(#bone)"/>
  <rect x="32" y="24" width="4" height="272" rx="2" fill="#475569" fill-opacity="0.25"/>
  <rect x="444" y="24" width="4" height="272" rx="2" fill="#475569" fill-opacity="0.25"/>
  <text x="240" y="300" text-anchor="middle" fill="#64748b" fill-opacity="0.85" font-family="system-ui, Segoe UI, sans-serif" font-size="11" font-weight="600" letter-spacing="0.08em">DIAGNOSTIC IMAGE</text>
</svg>
